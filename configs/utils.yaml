body_detector:
  model_path: "models/pretrained/pose_landmarker_full.task"
  num_poses: 2
  min_pose_detection_confidence: 0.5
  min_pose_presence_confidence: 0.5
  min_tracking_confidence: 0.5
  output_segmentation_masks: false

face_detector:
  model_path: "models/pretrained/face_landmarker.task"
  num_faces: 2
  min_face_detection_confidence: 0.5
  min_face_presence_confidence: 0.5
  min_tracking_confidence: 0.5
  output_face_blendshapes: false

hand_detector:
  model_path: "models/pretrained/hand_landmarker.task"
  num_hands: 2
  min_hand_detection_confidence: 0.5
  min_hand_presence_confidence: 0.5
  min_tracking_confidence: 0.5

tts:
  max_queue_size: 8

webcam:
  camera_index: 0
  width: 640
  height: 480
  fps: 24